<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flappy Maxxer - BinanceMaxxing Game</title>
    <link rel="icon" type="image/png" href="hero-mascot.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-header h1 {
            color: #F0B90B;
            font-size: 2.5rem;
            font-weight: 800;
            text-shadow: 0 0 20px rgba(240, 185, 11, 0.5);
        }

        .game-header p {
            color: #888;
            font-size: 1rem;
            margin-top: 5px;
        }

        #gameCanvas {
            border: 4px solid #F0B90B;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(240, 185, 11, 0.3);
            cursor: pointer;
        }

        .score-display {
            position: absolute;
            top: 130px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 3rem;
            font-weight: 900;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
            pointer-events: none;
        }

        .game-ui {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .game-btn {
            background-color: #F0B90B;
            color: #000;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .game-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(240, 185, 11, 0.5);
        }

        .high-score {
            color: #F0B90B;
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 15px;
        }

        .instructions {
            color: #666;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        @media (max-width: 500px) {
            .game-header h1 {
                font-size: 1.8rem;
            }

            #gameCanvas {
                border-width: 3px;
            }

            .game-btn {
                padding: 12px 30px;
                font-size: 1rem;
            }

            .score-display {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>Flappy Maxxer</h1>
            <p>How far can you maxx?</p>
        </div>

        <div class="score-display" id="scoreDisplay">0</div>
        <canvas id="gameCanvas"></canvas>

        <div class="high-score" id="highScore">High Score: 0</div>
        <p class="instructions">Click or press SPACE to flap</p>

        <div class="game-ui">
            <a href="index.html" class="game-btn">Back to Site</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const highScoreDisplay = document.getElementById('highScore');

        // Responsive canvas size
        function setCanvasSize() {
            const maxWidth = Math.min(1000, window.innerWidth - 40);
            const maxHeight = Math.min(500, window.innerHeight - 250);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }
        setCanvasSize();
        window.addEventListener('resize', setCanvasSize);

        // Game variables
        let gameRunning = false;
        let gameOver = false;
        let score = 0;
        let highScore = localStorage.getItem('flappyMaxxerHighScore') || 0;
        let gameStartTimer = 0;
        const graceFrames = 30; // Grace period at start
        highScoreDisplay.textContent = `High Score: ${highScore}`;

        // Cat properties
        const cat = {
            x: 80,
            y: canvas.height / 2.5,
            width: 50,
            height: 50,
            velocity: 0,
            gravity: 0.5,
            jumpStrength: -8,
            rotation: 0
        };

        // Pipe properties
        const pipes = [];
        const pipeWidth = 70;
        const pipeGap = 160;
        const pipeSpeed = 4;
        let pipeSpawnTimer = 0;
        const pipeSpawnInterval = 120;

        // Load cat image
        const catImage = new Image();
        catImage.src = 'hero-mascot.png';

        // Load coin image for pipes
        const coinImage = new Image();
        coinImage.src = 'hero-mascot.png';

        // Colors
        const colors = {
            background: '#0a0a0a',
            pipe: '#F0B90B',
            pipeBorder: '#000',
            ground: '#1a1a1a',
            groundLine: '#F0B90B'
        };

        function drawBackground() {
            // Dark background
            ctx.fillStyle = colors.background;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Stars
            ctx.fillStyle = '#F0B90B';
            for (let i = 0; i < 30; i++) {
                const x = (i * 47 + score * 0.5) % canvas.width;
                const y = (i * 31) % (canvas.height - 80);
                const size = (i % 3) + 1;
                ctx.globalAlpha = 0.3 + (i % 5) * 0.1;
                ctx.fillRect(x, y, size, size);
            }
            ctx.globalAlpha = 1;

            // Ground
            ctx.fillStyle = colors.ground;
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);

            // Ground line
            ctx.fillStyle = colors.groundLine;
            ctx.fillRect(0, canvas.height - 50, canvas.width, 4);
        }

        function drawCat() {
            ctx.save();
            ctx.translate(cat.x + cat.width / 2, cat.y + cat.height / 2);

            // Rotate based on velocity
            cat.rotation = Math.min(Math.max(cat.velocity * 3, -30), 45);
            ctx.rotate(cat.rotation * Math.PI / 180);

            if (catImage.complete) {
                ctx.drawImage(catImage, -cat.width / 2, -cat.height / 2, cat.width, cat.height);
            } else {
                // Fallback circle
                ctx.fillStyle = '#F0B90B';
                ctx.beginPath();
                ctx.arc(0, 0, cat.width / 2, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.restore();
        }

        function drawPipes() {
            pipes.forEach(pipe => {
                // Top pipe
                ctx.fillStyle = colors.pipe;
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);
                ctx.strokeStyle = colors.pipeBorder;
                ctx.lineWidth = 3;
                ctx.strokeRect(pipe.x, 0, pipeWidth, pipe.topHeight);

                // Top pipe cap
                ctx.fillRect(pipe.x - 5, pipe.topHeight - 20, pipeWidth + 10, 20);
                ctx.strokeRect(pipe.x - 5, pipe.topHeight - 20, pipeWidth + 10, 20);

                // Bottom pipe
                const bottomY = pipe.topHeight + pipeGap;
                ctx.fillStyle = colors.pipe;
                ctx.fillRect(pipe.x, bottomY, pipeWidth, canvas.height - bottomY - 50);
                ctx.strokeRect(pipe.x, bottomY, pipeWidth, canvas.height - bottomY - 50);

                // Bottom pipe cap
                ctx.fillRect(pipe.x - 5, bottomY, pipeWidth + 10, 20);
                ctx.strokeRect(pipe.x - 5, bottomY, pipeWidth + 10, 20);
            });
        }

        function drawStartScreen() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#F0B90B';
            ctx.font = 'bold 32px Inter';
            ctx.textAlign = 'center';
            ctx.fillText('Flappy Maxxer', canvas.width / 2, canvas.height / 2 - 60);

            ctx.fillStyle = '#fff';
            ctx.font = '18px Inter';
            ctx.fillText('Click or press SPACE', canvas.width / 2, canvas.height / 2);
            ctx.fillText('to start maxxing!', canvas.width / 2, canvas.height / 2 + 25);

            // Draw cat preview
            if (catImage.complete) {
                ctx.drawImage(catImage, canvas.width / 2 - 40, canvas.height / 2 + 50, 80, 80);
            }
        }

        function drawGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#F0B90B';
            ctx.font = 'bold 36px Inter';
            ctx.textAlign = 'center';
            ctx.fillText('REKT!', canvas.width / 2, canvas.height / 2 - 80);

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 48px Inter';
            ctx.fillText(score, canvas.width / 2, canvas.height / 2 - 20);

            ctx.font = '16px Inter';
            ctx.fillStyle = '#888';
            ctx.fillText('Score', canvas.width / 2, canvas.height / 2 + 10);

            if (score >= highScore && score > 0) {
                ctx.fillStyle = '#F0B90B';
                ctx.font = 'bold 20px Inter';
                ctx.fillText('NEW HIGH SCORE!', canvas.width / 2, canvas.height / 2 + 50);
            }

            ctx.fillStyle = '#fff';
            ctx.font = '18px Inter';
            ctx.fillText('Click to try again', canvas.width / 2, canvas.height / 2 + 100);
        }

        function spawnPipe() {
            const minHeight = 50;
            const maxHeight = canvas.height - pipeGap - 100;
            const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;

            pipes.push({
                x: canvas.width,
                topHeight: topHeight,
                passed: false
            });
        }

        function updateGame() {
            if (!gameRunning || gameOver) return;

            // Increment start timer
            gameStartTimer++;

            // Update cat with reduced gravity at start
            const currentGravity = gameStartTimer < graceFrames ? cat.gravity * 0.3 : cat.gravity;
            cat.velocity += currentGravity;
            cat.y += cat.velocity;

            // Spawn pipes
            pipeSpawnTimer++;
            if (pipeSpawnTimer >= pipeSpawnInterval) {
                spawnPipe();
                pipeSpawnTimer = 0;
            }

            // Update pipes
            pipes.forEach((pipe, index) => {
                pipe.x -= pipeSpeed;

                // Score
                if (!pipe.passed && pipe.x + pipeWidth < cat.x) {
                    pipe.passed = true;
                    score++;
                    scoreDisplay.textContent = score;
                }

                // Remove off-screen pipes
                if (pipe.x + pipeWidth < 0) {
                    pipes.splice(index, 1);
                }
            });

            // Collision detection
            checkCollision();
        }

        function checkCollision() {
            // Ground collision
            if (cat.y + cat.height > canvas.height - 50) {
                endGame();
                return;
            }

            // Ceiling collision
            if (cat.y < 0) {
                endGame();
                return;
            }

            // Pipe collision
            pipes.forEach(pipe => {
                const catRight = cat.x + cat.width - 10;
                const catLeft = cat.x + 10;
                const catTop = cat.y + 10;
                const catBottom = cat.y + cat.height - 10;

                if (catRight > pipe.x && catLeft < pipe.x + pipeWidth) {
                    if (catTop < pipe.topHeight || catBottom > pipe.topHeight + pipeGap) {
                        endGame();
                    }
                }
            });
        }

        function endGame() {
            gameOver = true;
            gameRunning = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('flappyMaxxerHighScore', highScore);
                highScoreDisplay.textContent = `High Score: ${highScore}`;
            }
        }

        function resetGame() {
            cat.y = canvas.height / 2.5;
            cat.velocity = 0;
            cat.rotation = 0;
            pipes.length = 0;
            pipeSpawnTimer = 0;
            gameStartTimer = 0;
            score = 0;
            scoreDisplay.textContent = '0';
            gameOver = false;
            gameRunning = true;
        }

        function jump() {
            if (gameOver) {
                resetGame();
                return;
            }

            if (!gameRunning) {
                gameRunning = true;
            }

            cat.velocity = cat.jumpStrength;
        }

        function gameLoop() {
            drawBackground();
            drawPipes();
            drawCat();

            if (!gameRunning && !gameOver) {
                drawStartScreen();
            } else if (gameOver) {
                drawGameOver();
            } else {
                updateGame();
            }

            requestAnimationFrame(gameLoop);
        }

        // Event listeners
        canvas.addEventListener('click', jump);
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                jump();
            }
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });

        // Start game loop
        gameLoop();
    </script>
</body>
</html>
