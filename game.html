<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flappy Maxxer - BinanceMaxxing Game</title>
    <link rel="icon" type="image/png" href="hero-mascot.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #F0B90B;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            color: #fff;
        }

        .game-header {
            text-align: center;
            margin-bottom: 15px;
        }

        .game-header h1 {
            color: #F0B90B;
            font-size: 2.5rem;
            font-weight: 800;
            text-shadow: 0 0 20px rgba(240, 185, 11, 0.5);
        }

        .game-header p {
            color: #888;
            font-size: 1rem;
            margin-top: 5px;
        }

        .game-wrapper {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            max-width: 1200px;
            width: 100%;
        }

        .game-area {
            flex: 0 0 70%;
        }

        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .canvas-container {
            position: relative;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            border: 4px solid #F0B90B;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(240, 185, 11, 0.3);
            cursor: pointer;
        }

        .score-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 3rem;
            font-weight: 900;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
            pointer-events: none;
        }

        .high-score {
            color: #F0B90B;
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 15px;
        }

        .instructions {
            color: #666;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .leaderboard {
            flex: 0 0 calc(30% - 30px);
            background: #111;
            border: 2px solid #F0B90B;
            border-radius: 12px;
            padding: 20px;
        }

        .leaderboard h3 {
            color: #F0B90B;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        .leaderboard-list {
            list-style: none;
        }

        .leaderboard-list li {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #333;
            color: #fff;
            font-size: 0.95rem;
        }

        .leaderboard-list li:last-child {
            border-bottom: none;
        }

        .leaderboard-list .rank {
            color: #F0B90B;
            font-weight: 700;
            width: 35px;
        }

        .leaderboard-list .name {
            flex: 1;
        }

        .leaderboard-list .score {
            font-weight: 600;
            color: #F0B90B;
        }

        .name-input-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .name-input-box {
            background: #111;
            border: 3px solid #F0B90B;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
        }

        .name-input-box h2 {
            color: #F0B90B;
            margin-bottom: 10px;
        }

        .name-input-box p {
            color: #888;
            margin-bottom: 20px;
        }

        .name-input-box input {
            background: #222;
            border: 2px solid #F0B90B;
            border-radius: 8px;
            padding: 12px 20px;
            color: #fff;
            font-size: 1.1rem;
            width: 200px;
            text-align: center;
            margin-bottom: 15px;
        }

        .name-input-box input:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(240,185,11,0.5);
        }

        .name-input-box button {
            background: #F0B90B;
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin: 5px;
        }

        .name-input-box button.skip {
            background: #333;
            color: #888;
        }

        @media (max-width: 900px) {
            .game-wrapper {
                flex-direction: column;
                align-items: center;
            }
            .game-area {
                flex: 0 0 100%;
                width: 100%;
            }
            .leaderboard {
                flex: 0 0 100%;
                width: 100%;
                max-width: 400px;
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Site</a>

    <div class="game-header">
        <h1>Flappy Maxxer</h1>
        <p>How far can you maxx?</p>
    </div>

    <div class="game-wrapper">
        <div class="game-area">
            <div class="canvas-container">
                <div class="score-display" id="scoreDisplay">0</div>
                <canvas id="gameCanvas" width="600" height="400"></canvas>
            </div>
            <div class="high-score" id="highScore">High Score: 0</div>
            <p class="instructions">Click or press SPACE to flap</p>
        </div>

        <div class="leaderboard">
            <h3>Leaderboard</h3>
            <ul class="leaderboard-list" id="leaderboardList">
                <li><span class="rank">-</span><span class="name">Loading...</span><span class="score">-</span></li>
            </ul>
        </div>
    </div>


    <div class="name-input-overlay" id="nameOverlay">
        <div class="name-input-box">
            <h2>New High Score!</h2>
            <p>Score: <span id="finalScore">0</span></p>
            <input type="text" id="playerName" placeholder="@yourhandle" maxlength="20">
            <br>
            <button onclick="submitScore()">Submit</button>
            <button class="skip" onclick="closeNameInput()">Skip</button>
        </div>
    </div>

    <script>
        // Supabase setup
        const SUPABASE_URL = 'https://ljsmmpzffzlzlbvwefkj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxqc21tcHpmZnpsemxidndlZmtqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzOTY4MDUsImV4cCI6MjA4Nzk3MjgwNX0.vhDoUi5lYN2U2hlb0FVzRofrBZwBO8SP1DjDOHSokcM';

        let supabaseClient = null;
        try {
            if (window.supabase) {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        } catch (e) {
            console.log('Supabase not available');
        }

        const leaderboardList = document.getElementById('leaderboardList');
        const nameOverlay = document.getElementById('nameOverlay');
        const finalScoreEl = document.getElementById('finalScore');
        const playerNameInput = document.getElementById('playerName');
        let pendingScore = 0;

        async function fetchLeaderboard() {
            if (!supabaseClient) {
                leaderboardList.innerHTML = '<li><span class="rank">-</span><span class="name">Offline</span><span class="score">-</span></li>';
                return;
            }
            try {
                const { data } = await supabaseClient.from('leaderboard').select('*').order('score', { ascending: false }).limit(10);
                if (data && data.length > 0) {
                    leaderboardList.innerHTML = data.map((e, i) => `<li><span class="rank">#${i+1}</span><span class="name">${e.name}</span><span class="score">${e.score}</span></li>`).join('');
                } else {
                    leaderboardList.innerHTML = '<li><span class="rank">-</span><span class="name">No scores yet</span><span class="score">-</span></li>';
                }
            } catch (e) {
                leaderboardList.innerHTML = '<li><span class="rank">-</span><span class="name">Error</span><span class="score">-</span></li>';
            }
        }

        async function submitScore() {
            const name = playerNameInput.value.trim() || 'Anonymous';
            if (supabaseClient) {
                try { await supabaseClient.from('leaderboard').insert([{ name, score: pendingScore }]); } catch(e) {}
            }
            closeNameInput();
            fetchLeaderboard();
        }

        function showNameInput(score) {
            pendingScore = score;
            finalScoreEl.textContent = score;
            playerNameInput.value = '';
            nameOverlay.style.display = 'flex';
            playerNameInput.focus();
        }

        function closeNameInput() {
            nameOverlay.style.display = 'none';
        }

        playerNameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitScore(); });
        fetchLeaderboard();

        // GAME CODE
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const highScoreDisplay = document.getElementById('highScore');

        let gameRunning = false;
        let gameOver = false;
        let score = 0;
        let highScore = localStorage.getItem('flappyMaxxerHighScore') || 0;
        let gameStartTimer = 0;
        const graceFrames = 30;
        highScoreDisplay.textContent = 'High Score: ' + highScore;

        const cat = {
            x: 80,
            y: 150,
            width: 50,
            height: 50,
            velocity: 0,
            gravity: 0.5,
            jumpStrength: -6.5,
            rotation: 0
        };

        const pipes = [];
        const pipeWidth = 70;
        const pipeGap = 160;
        const pipeSpeed = 4;
        let pipeSpawnTimer = 0;
        const pipeSpawnInterval = 120;

        const catImage = new Image();
        catImage.src = 'hero-mascot.png';

        const colors = {
            background: '#0a0a0a',
            pipe: '#F0B90B',
            pipeBorder: '#000',
            ground: '#1a1a1a',
            groundLine: '#F0B90B'
        };

        function drawBackground() {
            ctx.fillStyle = colors.background;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#F0B90B';
            for (let i = 0; i < 30; i++) {
                const x = (i * 47 + score * 0.5) % canvas.width;
                const y = (i * 31) % (canvas.height - 80);
                const size = (i % 3) + 1;
                ctx.globalAlpha = 0.3 + (i % 5) * 0.1;
                ctx.fillRect(x, y, size, size);
            }
            ctx.globalAlpha = 1;

            ctx.fillStyle = colors.ground;
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
            ctx.fillStyle = colors.groundLine;
            ctx.fillRect(0, canvas.height - 50, canvas.width, 4);
        }

        function drawCat() {
            ctx.save();
            ctx.translate(cat.x + cat.width / 2, cat.y + cat.height / 2);
            cat.rotation = Math.min(Math.max(cat.velocity * 1.5, -15), 25);
            ctx.rotate(cat.rotation * Math.PI / 180);

            if (catImage.complete && catImage.naturalWidth > 0) {
                ctx.drawImage(catImage, -cat.width / 2, -cat.height / 2, cat.width, cat.height);
            } else {
                ctx.fillStyle = '#F0B90B';
                ctx.beginPath();
                ctx.arc(0, 0, cat.width / 2, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        function drawPipes() {
            pipes.forEach(pipe => {
                ctx.fillStyle = colors.pipe;
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);
                ctx.strokeStyle = colors.pipeBorder;
                ctx.lineWidth = 3;
                ctx.strokeRect(pipe.x, 0, pipeWidth, pipe.topHeight);
                ctx.fillRect(pipe.x - 5, pipe.topHeight - 20, pipeWidth + 10, 20);
                ctx.strokeRect(pipe.x - 5, pipe.topHeight - 20, pipeWidth + 10, 20);

                const bottomY = pipe.topHeight + pipeGap;
                ctx.fillRect(pipe.x, bottomY, pipeWidth, canvas.height - bottomY - 50);
                ctx.strokeRect(pipe.x, bottomY, pipeWidth, canvas.height - bottomY - 50);
                ctx.fillRect(pipe.x - 5, bottomY, pipeWidth + 10, 20);
                ctx.strokeRect(pipe.x - 5, bottomY, pipeWidth + 10, 20);
            });
        }

        function drawStartScreen() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#F0B90B';
            ctx.font = 'bold 32px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Flappy Maxxer', canvas.width / 2, canvas.height / 2 - 60);

            ctx.fillStyle = '#fff';
            ctx.font = '18px Inter, sans-serif';
            ctx.fillText('Click or press SPACE', canvas.width / 2, canvas.height / 2);
            ctx.fillText('to start maxxing!', canvas.width / 2, canvas.height / 2 + 25);

            if (catImage.complete && catImage.naturalWidth > 0) {
                ctx.drawImage(catImage, canvas.width / 2 - 40, canvas.height / 2 + 50, 80, 80);
            }
        }

        function drawGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#F0B90B';
            ctx.font = 'bold 36px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('REKT!', canvas.width / 2, canvas.height / 2 - 80);

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 48px Inter, sans-serif';
            ctx.fillText(score, canvas.width / 2, canvas.height / 2 - 20);

            ctx.font = '16px Inter, sans-serif';
            ctx.fillStyle = '#888';
            ctx.fillText('Score', canvas.width / 2, canvas.height / 2 + 10);

            if (score >= highScore && score > 0) {
                ctx.fillStyle = '#F0B90B';
                ctx.font = 'bold 20px Inter, sans-serif';
                ctx.fillText('NEW HIGH SCORE!', canvas.width / 2, canvas.height / 2 + 50);
            }

            ctx.fillStyle = '#fff';
            ctx.font = '18px Inter, sans-serif';
            ctx.fillText('Click to try again', canvas.width / 2, canvas.height / 2 + 100);
        }

        function spawnPipe() {
            const minHeight = 50;
            const maxHeight = canvas.height - pipeGap - 100;
            const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;
            pipes.push({ x: canvas.width, topHeight, passed: false });
        }

        function updateGame() {
            if (!gameRunning || gameOver) return;

            gameStartTimer++;
            const currentGravity = gameStartTimer < graceFrames ? cat.gravity * 0.3 : cat.gravity;
            cat.velocity += currentGravity;
            cat.y += cat.velocity;

            pipeSpawnTimer++;
            if (pipeSpawnTimer >= pipeSpawnInterval) {
                spawnPipe();
                pipeSpawnTimer = 0;
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= pipeSpeed;
                if (!pipes[i].passed && pipes[i].x + pipeWidth < cat.x) {
                    pipes[i].passed = true;
                    score++;
                    scoreDisplay.textContent = score;
                }
                if (pipes[i].x + pipeWidth < 0) {
                    pipes.splice(i, 1);
                }
            }

            checkCollision();
        }

        function checkCollision() {
            if (cat.y + cat.height > canvas.height - 50 || cat.y < 0) {
                endGame();
                return;
            }

            for (const pipe of pipes) {
                const catRight = cat.x + cat.width - 10;
                const catLeft = cat.x + 10;
                const catTop = cat.y + 10;
                const catBottom = cat.y + cat.height - 10;

                if (catRight > pipe.x && catLeft < pipe.x + pipeWidth) {
                    if (catTop < pipe.topHeight || catBottom > pipe.topHeight + pipeGap) {
                        endGame();
                        return;
                    }
                }
            }
        }

        function endGame() {
            gameOver = true;
            gameRunning = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('flappyMaxxerHighScore', highScore);
                highScoreDisplay.textContent = 'High Score: ' + highScore;
            }

            if (score > 0) {
                setTimeout(() => showNameInput(score), 500);
            }
        }

        function resetGame() {
            cat.y = 150;
            cat.velocity = 0;
            cat.rotation = 0;
            pipes.length = 0;
            pipeSpawnTimer = 0;
            gameStartTimer = 0;
            score = 0;
            scoreDisplay.textContent = '0';
            gameOver = false;
            gameRunning = true;
        }

        function jump() {
            if (gameOver) {
                resetGame();
                return;
            }
            if (!gameRunning) {
                gameRunning = true;
            }
            cat.velocity = cat.jumpStrength;
        }

        function gameLoop() {
            drawBackground();
            drawPipes();
            drawCat();

            if (!gameRunning && !gameOver) {
                drawStartScreen();
            } else if (gameOver) {
                drawGameOver();
            } else {
                updateGame();
            }

            requestAnimationFrame(gameLoop);
        }

        canvas.addEventListener('click', jump);
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                jump();
            }
        });
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });

        // Start the game
        gameLoop();
    </script>
</body>
</html>
